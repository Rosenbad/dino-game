<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>T-Rex Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0f0c29;font-family:monospace;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.hud{display:flex;justify-content:center;gap:20px;padding:4px 0;font-size:16px}
.sc{font-weight:bold;color:#e94560}.hi{font-size:12px;color:#555;line-height:20px}
canvas#c{display:block;touch-action:none}
.info{color:#666;font-size:11px;padding:2px 0;text-align:center}.warn{color:#e94560}

/* 竖屏提示 */
.orient{display:none;position:fixed;inset:0;z-index:999;background:#0f0c29;color:#fff;font-size:18px;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.orient .ico{font-size:48px;animation:sp 1.2s ease-in-out infinite}
@keyframes sp{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
.orient.on{display:flex}

/* 摇盘 */
.joy{display:none;position:fixed;bottom:10px;left:10px;z-index:100;touch-action:none}
.joy.on{display:block}
.joy canvas{touch-action:none;display:block}

/* 跳跃按钮 */
.jbtn{display:none;position:fixed;bottom:20px;right:20px;width:80px;height:80px;border-radius:50%;border:3px solid rgba(233,69,96,0.5);background:rgba(233,69,96,0.2);color:#fff;font-size:24px;font-weight:bold;z-index:100;touch-action:none;align-items:center;justify-content:center;transition:background 0.08s}
.jbtn.on{display:flex}
.jbtn.pressed{background:rgba(233,69,96,0.7);border-color:#e94560}

@media(orientation:portrait) and (max-width:900px){
  .orient.on~.hud,.orient.on~#c,.orient.on~.info,.orient.on~.joy,.orient.on~.jbtn{display:none!important}
}
</style>
</head>
<body>

<div class="orient" id="orient"><div class="ico">📱↻</div><div>请旋转手机到横屏</div></div>
<div class="hud"><div class="sc" id="sc">00000</div><div class="hi">HI <span id="hi">00000</span></div></div>
<canvas id="c"></canvas>
<div class="info" id="infoBar"><span class="warn">←→</span>移动 <span class="warn">空格</span>跳 <span class="warn">↓</span>蹲</div>

<div class="joy" id="joy"><canvas id="jc"></canvas></div>
<div class="jbtn" id="jbtn">JUMP</div>

<script>
// 错误捕获：显示在屏幕上
window.onerror=function(m,s,l,c,e){
  document.body.innerHTML='<pre style="color:red;padding:20px;font-size:14px;white-space:pre-wrap">ERROR: '+m+'\nLine: '+l+' Col: '+c+'\n'+(e&&e.stack?e.stack.split('\n').slice(0,3).join('\n'):'')+'</pre>';
  return true;
};
'use strict';

// ===== 基础 =====
const cv=document.getElementById('c'),cx=cv.getContext('2d',{alpha:false});
const JW=800,JH=260,GY=210,MSPEED=5;
const MOBILE='ontouchstart'in window||navigator.maxTouchPoints>0;

// ===== 画布自适应 =====
function resize(){
  const vw=innerWidth,vh=innerHeight;
  const hudH=24,pad=MOBILE?80:0; // 手机底部留给摇盘/按钮
  const availW=vw-(MOBILE?16:32), availVH=vh-hudH-(MOBILE?pad:30);
  const ratio=JW/JH;
  let cw=Math.min(availW,800),ch=Math.floor(cw/ratio);
  if(ch>availVH){ch=availVH;cw=Math.floor(ch*ratio);}
  cv.width=JW;cv.height=JH;
  cv.style.width=cw+'px';cv.style.height=ch+'px';

  if(MOBILE){
    // 摇盘
    const jsz=Math.min(vw*0.38,vh*0.38,160);
    const jc=document.getElementById('jc');
    jc.width=jsz*2;jc.height=jsz*2; // 2x 分辨率防模糊
    jc.style.width=jsz+'px';jc.style.height=jsz+'px';
    JOY_R=jsz*0.8;THUMB_R=jsz*0.3;JOY_CX=jsz;JOY_CY=jsz;
    // 跳跃按钮
    const bsz=Math.floor(Math.min(vw*0.2,vh*0.25,100));
    const jb=document.getElementById('jbtn');
    jb.style.width=bsz+'px';jb.style.height=bsz+'px';
    jb.style.fontSize=Math.floor(bsz*0.3)+'px';
  }
}
resize();
addEventListener('resize',resize);

// ===== 横屏检测 =====
const orientEl=document.getElementById('orient');
function chkOri(){
  if(!MOBILE)return;
  const ls=innerWidth>innerHeight;
  orientEl.classList.toggle('on',!ls);
  // 尝试锁定横屏
  if(ls&&screen.orientation&&screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
chkOri();
addEventListener('resize',chkOri);
addEventListener('orientationchange',()=>setTimeout(chkOri,200));

// 显示手机控件
if(MOBILE){
  document.getElementById('joy').classList.add('on');
  document.getElementById('jbtn').classList.add('on');
  document.getElementById('infoBar').style.display='none';
}

// ===== 摇盘 =====
let JOY_R=80,THUMB_R=24,JOY_CX=80,JOY_CY=80;
const joyCanvas=document.getElementById('jc');
const jctx=joyCanvas.getContext('2d');
const joy={dx:0,dy:0,rawX:0,rawY:0,active:false};
let joyPid=null;

function drawJoy(){
  const scale=joyCanvas.width/(JOY_CX*2); // 2x canvas 缩放
  jctx.clearRect(0,0,joyCanvas.width,joyCanvas.height);
  jctx.save();
  jctx.scale(scale,scale);

  // 底盘
  jctx.beginPath();jctx.arc(JOY_CX,JOY_CY,JOY_R,0,Math.PI*2);
  jctx.fillStyle='rgba(255,255,255,0.06)';jctx.fill();
  jctx.strokeStyle='rgba(255,255,255,0.2)';jctx.lineWidth=2;jctx.stroke();

  // 十字线
  jctx.strokeStyle='rgba(255,255,255,0.08)';jctx.lineWidth=1;
  jctx.beginPath();jctx.moveTo(JOY_CX-JOY_R+10,JOY_CY);jctx.lineTo(JOY_CX+JOY_R-10,JOY_CY);jctx.stroke();
  jctx.beginPath();jctx.moveTo(JOY_CX,JOY_CY-JOY_R+10);jctx.lineTo(JOY_CX,JOY_CY+JOY_R-10);jctx.stroke();

  // 摇杆（平滑插值位置）
  const tx=joy.rawX*JOY_R*0.75;
  const ty=joy.rawY*JOY_R*0.75;
  jctx.beginPath();jctx.arc(JOY_CX+tx,JOY_CY+ty,THUMB_R,0,Math.PI*2);
  jctx.fillStyle=joy.active?'rgba(233,69,96,0.5)':'rgba(255,255,255,0.12)';
  jctx.fill();
  jctx.strokeStyle=joy.active?'#e94560':'rgba(255,255,255,0.25)';
  jctx.lineWidth=2;jctx.stroke();

  jctx.restore();
}

function joyMove(cx2,cy2){
  const r=joyCanvas.getBoundingClientRect();
  const sx=joyCanvas.width/r.width,sy=joyCanvas.height/r.height;
  let px=(cx2-r.left)*sx-JOY_CX, py=(cy2-r.top)*sy-JOY_CY;
  const d=Math.sqrt(px*px+py*py);
  if(d>JOY_R){px=px/d*JOY_R;py=py/d*JOY_R;}
  joy.rawX=px/JOY_R;joy.rawY=py/JOY_R;joy.active=true;
  // 死区 0.25
  const TH=0.25;
  joy.dx=Math.abs(joy.rawX)<TH?0:(joy.rawX>0?1:-1);
  joy.dy=Math.abs(joy.rawY)<TH?0:(joy.rawY>0?1:-1);
}

joyCanvas.addEventListener('pointerdown',e=>{
  e.preventDefault();e.stopPropagation();
  joyPid=e.pointerId;joyCanvas.setPointerCapture(e.pointerId);
  joyMove(e.clientX,e.clientY);
});
joyCanvas.addEventListener('pointermove',e=>{
  if(e.pointerId!==joyPid)return;e.preventDefault();
  joyMove(e.clientX,e.clientY);
});
joyCanvas.addEventListener('pointerup',e=>{
  if(e.pointerId!==joyPid)return;
  joyPid=null;joy.dx=0;joy.dy=0;joy.rawX=0;joy.rawY=0;joy.active=false;
});
joyCanvas.addEventListener('pointercancel',()=>{
  joyPid=null;joy.dx=0;joy.dy=0;joy.rawX=0;joy.rawY=0;joy.active=false;
});

// 防止摇盘区域触发全局手势
joyCanvas.addEventListener('touchstart',e=>e.stopPropagation(),{passive:false});
joyCanvas.addEventListener('touchmove',e=>e.stopPropagation(),{passive:false});

drawJoy();

// ===== 跳跃按钮 =====
const jbtn=document.getElementById('jbtn');
let jbtnPid=null;
jbtn.addEventListener('pointerdown',e=>{
  e.preventDefault();e.stopPropagation();
  jbtnPid=e.pointerId;jbtn.classList.add('pressed');
  if(state==='run')D.jump();else startGame();
});
jbtn.addEventListener('pointerup',e=>{
  if(e.pointerId!==jbtnPid)return;
  jbtnPid=null;jbtn.classList.remove('pressed');
});
jbtn.addEventListener('pointercancel',()=>{jbtnPid=null;jbtn.classList.remove('pressed');});
jbtn.addEventListener('touchstart',e=>e.stopPropagation(),{passive:false});

// 全局：手指全离开时清空状态
addEventListener('touchend',e=>{
  if(e.touches.length===0){joyPid=null;joy.dx=0;joy.dy=0;joy.rawX=0;joy.rawY=0;joy.active=false;}
});
addEventListener('touchcancel',e=>{
  if(e.touches.length===0){joyPid=null;joy.dx=0;joy.dy=0;joy.rawX=0;joy.rawY=0;joy.active=false;}
});

// ===== 嘲讽 =====
const taunts={
  die:['💀 你死了！','🤡 又没了？','😤 太菜了！','😂 笑死我了','🧠 反应速度负数','👻 下次加油','🎮 手残党认证'],
  hit:['😱 好险！','😅 差一点','⚡ 电光火石','🙈 没看见！'],
  idle:['😴 睡着了？','🦥 比乌龟还慢','🐢 动一下啊'],
  doubleJump:['🦘 二段跳！','✨ 漂亮！','🔥 操作不错'],
  duck:['🦆 蹲下躲避','🥷 忍者蹲'],
  fast:['🚀 速度不错！','💨 风一样的速度'],
  combo:['🔥 连续闪避！','💫 完美操作！','⭐ 技术不错！']
};
let cTaunt='',tT=0,tC='#fff',hitC=0,lastTT=0,idleT=0;
function showTaunt(t,c){
  const n=Date.now();if(n-lastTT<800)return;
  cTaunt=c||taunts[t][Math.floor(Math.random()*taunts[t].length)];
  tT=80;tC=t==='die'?'#e94560':t==='hit'?'#ff6b35':t==='combo'?'#ffd700':'#fff';lastTT=n;
}
function drawTaunt(){
  if(tT<=0)return;tT--;
  cx.globalAlpha=Math.min(1,tT/20);cx.fillStyle=tC;cx.font='bold 16px monospace';cx.textAlign='center';
  const s=tT>60?Math.random()*4-2:0;
  cx.fillText(cTaunt,JW/2+s,60+s);cx.globalAlpha=1;
}

// ===== 恐龙 =====
const D={
  x:JW/2-16,y:GY-40,w:32,h:40,vy:0,vx:0,gnd:true,dbl:true,duck:false,fr:0,tm:0,faceR:true,
  prevDuck:false,
  reset(){this.x=JW/2-16;this.y=GY-this.h;this.vy=0;this.vx=0;this.gnd=true;this.dbl=true;this.duck=false;this.h=40;this.faceR=true;this.prevDuck=false;},
  jump(){
    if(this.gnd){this.vy=-14;this.gnd=false;this.dbl=true;}
    else if(this.dbl){this.vy=-12;this.dbl=false;spark(this.x+16,this.y+this.h,6);showTaunt('doubleJump');}
  },
  setDuck(v){
    if(v===this.prevDuck)return; // 状态没变就跳过
    this.prevDuck=v;
    if(v&&this.gnd){this.duck=true;this.h=24;this.y=GY-24;}
    else if(!v){this.duck=false;this.h=40;this.y=GY-40;}
  },
  moveL(){this.vx=-MSPEED;this.faceR=false;},
  moveR(){this.vx=MSPEED;this.faceR=true;},
  stopM(){this.vx=0;},
  upd(){
    this.x+=this.vx;if(this.x<0)this.x=0;if(this.x>JW-this.w)this.x=JW-this.w;
    if(!this.gnd){this.vy+=0.6;this.y+=this.vy;if(this.y>=GY-this.h){this.y=GY-this.h;this.vy=0;this.gnd=true;this.dbl=false;}}
    this.tm++;if(this.tm>5){this.tm=0;this.fr^=1;}
  },
  box(){return this.duck?{x:this.x+2,y:this.y+2,w:28,h:20}:{x:this.x+4,y:this.y+4,w:24,h:34};},
  draw(){
    const x=this.x,y=this.y,f=this.faceR;cx.fillStyle='#e94560';
    if(this.duck){
      cx.fillRect(x,y+4,36,12);
      if(f){cx.fillRect(x+32,y,10,9);cx.fillStyle='#fff';cx.fillRect(x+37,y+2,3,3);}
      else{cx.fillRect(x-2,y,10,9);cx.fillStyle='#fff';cx.fillRect(x+1,y+2,3,3);}
      cx.fillStyle='#e94560';
      cx.fillRect(x+(f?(this.fr?6:14):(this.fr?16:8)),y+16,7,8);
      cx.fillRect(x+(f?(this.fr?18:24):(this.fr?8:18)),y+16,7,8);
    }else{
      cx.fillRect(x+4,y+10,22,20);
      if(f){cx.fillRect(x+14,y,22,15);cx.fillStyle='#fff';cx.fillRect(x+30,y+3,5,5);cx.fillStyle='#e94560';cx.fillRect(x+32,y+4,2,2);cx.fillRect(x+36,y+12,4,2);cx.fillRect(x,y+10,6,4);cx.fillRect(x-2,y+7,4,5);cx.fillRect(x+24,y+18,7,3);}
      else{cx.fillRect(x-4,y,22,15);cx.fillStyle='#fff';cx.fillRect(x+2,y+3,5,5);cx.fillStyle='#e94560';cx.fillRect(x+4,y+4,2,2);cx.fillRect(x-2,y+12,4,2);cx.fillRect(x+22,y+10,6,4);cx.fillRect(x+26,y+7,4,5);cx.fillRect(x+5,y+18,7,3);}
      if(this.gnd){if(this.fr){cx.fillRect(x+6,y+30,6,10);cx.fillRect(x+18,y+30,6,10);}else{cx.fillRect(x+10,y+30,6,10);cx.fillRect(x+14,y+30,6,10);}}
      else{cx.fillRect(x+6,y+30,6,8);cx.fillRect(x+18,y+32,6,6);}
    }
  }
};

// ===== 障碍物 =====
let obs=[],sparkP=[],warnX=null,warnT=0;
function spawnObs(){
  const r=Math.random();
  if(r<0.5){
    const x=D.faceR?JW+20:-40;const ts=['spike','tallSpike','doubleSpike'];const t=ts[Math.floor(Math.random()*3)];
    let w,h;switch(t){case'spike':w=14;h=28;break;case'tallSpike':w=16;h=40;break;default:w=30;h=30;}
    obs.push({x,dir:1,w,h,t});
  }else if(r<0.75&&score>30){
    const x=D.faceR?-40:JW+20;const ts=['fireball','saw'];const t=ts[Math.floor(Math.random()*2)];
    obs.push({x,dir:-1,w:t==='fireball'?16:22,h:t==='fireball'?16:22,y:GY-Math.random()*50-30,t,rot:0});
  }else{
    const dropX=Math.max(30,Math.min(JW-50,D.x+(Math.random()-0.5)*250));
    const t=Math.random()<0.5?'drop':'bomb';warnX=dropX;warnT=40;
    setTimeout(()=>{if(state==='run')obs.push({x:dropX,dir:0,w:18,h:18,t,vy:3+Math.random()*2,y:-30});},400);
  }
}
function updObs(){
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    if(o.dir===1)o.x-=speed;else if(o.dir===-1)o.x+=speed*0.9;
    else{o.y+=o.vy;if(o.t==='bomb'&&!o.exploded&&o.y>GY-40){o.exploded=true;spark(o.x+10,o.y+12,20);if(Math.abs(D.x+16-o.x-10)<60&&Math.abs(D.y+20-o.y-12)<50){endGame();return;}}}
    if(o.t==='saw')o.rot=(o.rot||0)+0.3;
    if(o.x<-80||o.x>JW+80||o.y>JH+40){obs.splice(i,1);continue;}
    if(o.t==='bomb'&&o.exploded)continue;
    if(hitBox(o)){endGame();return;}
  }
  if(warnT<=0)warnX=null;
}
function hitBox(o){
  const b=D.box();let ox=o.x,oy=o.dir===1?GY-o.h:o.y;
  const r=b.x<ox+o.w-6&&b.x+b.w>ox+6&&b.y<oy+o.h-6&&b.y+b.h>oy+6;
  if(r){hitC++;if(hitC>=3)showTaunt('combo');}return r;
}
function drawObs(){
  obs.forEach(o=>{
    let x=o.x,y=o.dir===1?GY-o.h:o.y;
    cx.fillStyle=o.dir===1?'#555':o.dir===-1?'#ff6b35':'#ffd700';
    switch(o.t){
      case'spike':cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+7,y);cx.lineTo(x+14,GY);cx.fill();break;
      case'tallSpike':cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+8,y);cx.lineTo(x+16,GY);cx.fill();cx.fillRect(x+3,y+8,10,4);break;
      case'doubleSpike':cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+7,y+4);cx.lineTo(x+14,GY);cx.fill();cx.beginPath();cx.moveTo(x+16,GY);cx.lineTo(x+23,y);cx.lineTo(x+30,GY);cx.fill();break;
      case'fireball':cx.fillRect(x,y,16,16);cx.fillStyle='#ffaa00';cx.fillRect(x+3,y+3,10,10);break;
      case'saw':cx.save();cx.translate(x+11,y+11);cx.rotate(o.rot||0);cx.fillStyle='#aaa';for(let j=0;j<6;j++){cx.fillRect(-2,-10,4,4);cx.rotate(Math.PI/3);}cx.fillStyle='#555';cx.beginPath();cx.arc(0,0,4,0,Math.PI*2);cx.fill();cx.restore();break;
      case'drop':cx.fillStyle='#ffd700';cx.beginPath();cx.moveTo(x+9,y);cx.lineTo(x+18,y+18);cx.lineTo(x,y+18);cx.closePath();cx.fill();break;
      case'bomb':cx.fillStyle='#333';cx.beginPath();cx.arc(x+10,y+14,10,0,Math.PI*2);cx.fill();cx.fillStyle='#e94560';cx.fillRect(x+8,y,4,6);cx.fillStyle='#ff6b35';cx.fillRect(x+6,y-2,8,3);break;
    }
  });
  if(warnT>0&&warnX!==null){
    cx.fillStyle=`rgba(255,215,0,${(Math.sin(Date.now()/80)*0.3+0.4)*(warnT/50)})`;
    cx.fillRect(warnX-5,0,30,GY);
    cx.fillStyle='#ffd700';cx.beginPath();cx.moveTo(warnX+10,10);cx.lineTo(warnX+5,25);cx.lineTo(warnX+15,25);cx.closePath();cx.fill();
    cx.font='12px monospace';cx.textAlign='center';cx.fillText('⚠',warnX+10,40);warnT--;
  }
}
function spark(x,y,n){for(let i=0;i<n;i++)sparkP.push({x,y,vx:(Math.random()-0.5)*6,vy:-Math.random()*4-1,life:18+Math.random()*12,c:Math.random()>0.5?'#e94560':'#ff6b35'});}
function updSpark(){for(let i=sparkP.length-1;i>=0;i--){const p=sparkP[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;if(--p.life<=0)sparkP.splice(i,1);}}
function drawSpark(){sparkP.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.c;cx.fillRect(p.x,p.y,3,3);});cx.globalAlpha=1;}

let gd=0;
function drawGround(){cx.strokeStyle='#444';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GY);cx.lineTo(JW,GY);cx.stroke();gd-=speed;if(gd<-20)gd+=20;cx.fillStyle='#555';for(let x=gd;x<JW;x+=20)cx.fillRect(x,GY+4,12,2);}
function drawHUD(){
  cx.fillStyle='rgba(0,0,0,0.3)';cx.fillRect(10,8,120,18);cx.strokeStyle='#444';cx.strokeRect(10,8,120,18);
  cx.fillStyle='#e94560';cx.fillRect(12,10,D.x/JW*116,14);cx.fillStyle='#888';cx.font='8px monospace';cx.textAlign='left';cx.fillText('位置',14,20);
  cx.fillStyle='rgba(0,0,0,0.3)';cx.fillRect(JW-110,8,100,18);cx.fillStyle='#ff6b35';cx.font='10px monospace';cx.textAlign='right';cx.fillText('速度: '+speed.toFixed(1),JW-16,20);
}
function pad(n){return String(Math.floor(n)).padStart(5,'0');}

// ===== 游戏状态 =====
let state='idle',score=0,speed=5,hi=parseInt(localStorage.getItem('dh')||'0');
let spawnT=0,spawnI=70,keys={},dist=0,lastTS=0;
document.getElementById('hi').textContent=pad(hi);

function init(){D.reset();obs=[];sparkP=[];score=0;speed=5;spawnT=0;spawnI=40;keys={};warnX=null;warnT=0;dist=0;idleT=0;hitC=0;lastTS=0;document.getElementById('sc').textContent='00000';}

// ===== 单一动画循环（核心优化）=====
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTS)lastTS=ts;
  const rawDt=(ts-lastTS)/16.67;
  const dt=Math.min(rawDt>0?rawDt:1,3); // 防止 dt=0 或负数
  lastTS=ts;

  // 摇盘/键盘 → 输入
  if(state==='run'){
    if(joy.dx<0||keys.ArrowLeft||keys.KeyA)D.moveL();
    else if(joy.dx>0||keys.ArrowRight||keys.KeyD)D.moveR();
    else D.stopM();
    // 摇盘上推=跳（触发式，推一次跳一次）
    if(joy.dy<0){D.jump();joy.dy=0;}
    // 摇盘下推=蹲（持续按住）
    D.setDuck(joy.dy>0);
  }

  // --- 渲染 ---
  cx.clearRect(0,0,JW,JH);
  // 背景渐变（只在 resize 时重建更高效，但这里简单处理）
  cx.fillStyle='#0f0c29';cx.fillRect(0,0,JW,JH);
  drawGround();

  if(state==='run'){
    score+=0.2*dt;document.getElementById('sc').textContent=pad(score);
    dist+=speed*dt;if(speed<14)speed=5+dist*0.0001;
    if(speed>10&&Math.random()<0.002*dt)showTaunt('fast');
    spawnI=Math.max(20,50-Math.floor(speed*3));spawnT+=dt;
    if(spawnT>=spawnI){spawnT=0;spawnObs();if(speed>10&&Math.random()<0.3)spawnObs();}
    updObs();D.upd();updSpark();
  }

  drawObs();D.draw();drawSpark();drawHUD();drawTaunt();

  if(state==='idle'){
    idleT++;if(idleT>150&&idleT%150===0)showTaunt('idle');
    cx.fillStyle='#e94560';cx.font='16px monospace';cx.textAlign='center';
    if(Math.floor(Date.now()/350)%2)cx.fillText(MOBILE?'👇 点 JUMP 开始':'按 空格 开始',JW/2,90);
    cx.font='11px monospace';cx.fillStyle='#666';
    cx.fillText(MOBILE?'摇盘移动 | 右侧跳跃':'← → 移动 | 空格跳跃 | ↓蹲',JW/2,115);
  }else{idleT=0;}

  if(state==='over'){
    cx.fillStyle='#e94560';cx.font='bold 22px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',JW/2,80);cx.font='14px monospace';
    if(Math.floor(Date.now()/350)%2)cx.fillText(MOBILE?'👇 点 JUMP 重开':'按 空格 重开',JW/2,105);
    cx.fillStyle='#ff6b35';cx.fillText('得分: '+pad(score),JW/2,125);
    cx.fillStyle='#888';cx.fillText('距离: '+Math.floor(dist)+'m',JW/2,145);
  }

  // 摇盘在同一个循环里绘制
  if(MOBILE)drawJoy();
}

function startGame(){init();state='run';showTaunt('hit',Math.random()<0.5?'🎮 开始了！':'🏃 冲啊！');}
function endGame(){state='over';D.vx=0;hitC=0;showTaunt('die');if(score>hi){hi=Math.floor(score);localStorage.setItem('dh',hi);document.getElementById('hi').textContent=pad(hi);}}

// ===== 键盘 =====
let _sp=false;
onkeydown=e=>{
  keys[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp')&&!_sp){e.preventDefault();_sp=true;if(state==='run')D.jump();else startGame();}
  if(e.code==='ArrowDown'){e.preventDefault();if(state==='run')D.setDuck(true);}
};
onkeyup=e=>{keys[e.code]=false;if(e.code==='Space'||e.code==='ArrowUp')_sp=false;if(e.code==='ArrowDown')D.setDuck(false);};

cv.addEventListener('click',()=>{if(state!=='run')startGame();});

// 防止全局触摸手势
document.addEventListener('touchmove',e=>{if(e.target===cv||e.target===joyCanvas)e.preventDefault();},{passive:false});

requestAnimationFrame(loop);
</script>
</body>
</html>
