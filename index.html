<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>T-Rex Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0f0c29;font-family:monospace;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}
.hud{display:flex;justify-content:center;gap:20px;padding:4px 0;font-size:16px}
.sc{font-weight:bold;color:#e94560}.hi{font-size:12px;color:#555;line-height:20px}
canvas#c{display:block}
.info{color:#666;font-size:11px;padding:2px 0;text-align:center}.warn{color:#e94560}

.orient{display:none;position:fixed;inset:0;z-index:999;background:#0f0c29;color:#fff;font-size:18px;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.orient .ico{font-size:48px;animation:sp 1.2s ease-in-out infinite}
@keyframes sp{50%{transform:rotate(90deg)}}
.orient.on{display:flex}
</style>
</head>
<body>
<div class="orient" id="orient"><div class="ico">📱↻</div><div>请旋转手机到横屏</div></div>
<div class="hud"><div class="sc" id="sc">00000</div><div class="hi">HI <span id="hi">00000</span></div></div>
<canvas id="c"></canvas>
<div class="info" id="infoBar"><span class="warn">←→</span>移动 <span class="warn">空格</span>跳 <span class="warn">↓</span>蹲</div>
<canvas id="joyC"></canvas>
<div id="jbtn"></div>
<div id="dbtn"></div>

<script>
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d',{alpha:false});
const JW=800,JH=260,GY=210,MSPEED=5;
const MOBILE='ontouchstart'in window||navigator.maxTouchPoints>0;

// ===== 横屏检测 =====
const orientEl=document.getElementById('orient');
function chkOri(){
  if(!MOBILE)return;
  orientEl.classList.toggle('on',innerWidth<=innerHeight);
  if(innerWidth>innerHeight&&screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});
}
chkOri();
addEventListener('resize',chkOri);
addEventListener('orientationchange',()=>setTimeout(chkOri,200));

// ===== 摇盘参数 =====
let JOY_R=80,THUMB_R=28,JOY_CX=80,JOY_CY=80;
const joyCanvas=document.getElementById('joyC');
const jctx=joyCanvas.getContext('2d');
const joy={dx:0,dy:0,rawX:0,rawY:0,active:false};

// ===== 画布自适应 =====
function resize(){
  const vw=innerWidth,vh=innerHeight;
  const ratio=JW/JH;
  if(MOBILE){
    // 手机横屏：上方游戏画面，下方左右各放控件
    const ctrlH=vh*0.35; // 控件区占 35%
    const gameH=vh-ctrlH-24;
    let cw=Math.min(vw,JW),ch=Math.floor(cw/ratio);
    if(ch>gameH){ch=gameH;cw=Math.floor(ch*ratio);}
    cv.width=JW;cv.height=JH;
    cv.style.width=cw+'px';cv.style.height=ch+'px';
    cv.style.marginTop='4px';
    // 摇盘：左下
    const jsz=Math.floor(Math.min(vw*0.4,ctrlH*0.85,160));
    joyCanvas.width=jsz*2;joyCanvas.height=jsz*2;
    joyCanvas.style.width=jsz+'px';joyCanvas.style.height=jsz+'px';
    joyCanvas.style.display='block';
    joyCanvas.style.position='fixed';
    joyCanvas.style.left=Math.floor(vw*0.02)+'px';
    joyCanvas.style.bottom=Math.floor(ctrlH*0.05)+'px';
    joyCanvas.style.zIndex='100';
    joyCanvas.style.touchAction='none';
    JOY_R=jsz*0.75;THUMB_R=jsz*0.28;JOY_CX=jsz;JOY_CY=jsz;
    // 跳跃按钮：右下
    const bsz=Math.floor(Math.min(vw*0.22,ctrlH*0.7,110));
    const jb=document.getElementById('jbtn');
    jb.style.cssText='display:block;position:fixed;z-index:100;touch-action:none;border-radius:50%;'
      +'width:'+bsz+'px;height:'+bsz+'px;'
      +'right:'+Math.floor(vw*0.06)+'px;bottom:'+Math.floor(ctrlH*0.1)+'px;'
      +'border:3px solid rgba(233,69,96,0.5);background:rgba(233,69,96,0.2);'
      +'color:#fff;font-size:'+Math.floor(bsz*0.3)+'px;font-weight:bold;font-family:monospace;'
      +'display:flex;align-items:center;justify-content:center';
    jb.textContent='JUMP';
    // 蹲下按钮：在跳跃按钮下方
    const db=document.getElementById('dbtn');
    const dsz=Math.floor(bsz*0.65);
    db.style.cssText='display:block;position:fixed;z-index:100;touch-action:none;border-radius:50%;'
      +'width:'+dsz+'px;height:'+dsz+'px;'
      +'right:'+Math.floor(vw*0.06+(bsz-dsz)/2)+'px;bottom:'+Math.floor(ctrlH*0.1+bsz+8)+'px;'
      +'border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);'
      +'color:#fff;font-size:'+Math.floor(dsz*0.35)+'px;font-family:monospace;'
      +'display:flex;align-items:center;justify-content:center';
    db.textContent='▼';
  }else{
    const availW=vw-32,availH=vh-50;
    let cw=Math.min(availW,800),ch=Math.floor(cw/ratio);
    if(ch>availH){ch=availH;cw=Math.floor(ch*ratio);}
    cv.width=JW;cv.height=JH;
    cv.style.width=cw+'px';cv.style.height=ch+'px';
    joyCanvas.style.display='none';
    document.getElementById('jbtn').style.display='none';
    document.getElementById('dbtn').style.display='none';
  }
}
resize();
addEventListener('resize',resize);

// ===== 摇盘绘制 =====
function drawJoy(){
  const s=joyCanvas.width/(JOY_CX*2);
  jctx.clearRect(0,0,joyCanvas.width,joyCanvas.height);
  jctx.save();jctx.scale(s,s);
  // 底盘
  jctx.beginPath();jctx.arc(JOY_CX,JOY_CY,JOY_R,0,Math.PI*2);
  jctx.fillStyle='rgba(255,255,255,0.06)';jctx.fill();
  jctx.strokeStyle='rgba(255,255,255,0.2)';jctx.lineWidth=2;jctx.stroke();
  // 十字
  jctx.strokeStyle='rgba(255,255,255,0.08)';jctx.lineWidth=1;
  jctx.beginPath();jctx.moveTo(JOY_CX-JOY_R+8,JOY_CY);jctx.lineTo(JOY_CX+JOY_R-8,JOY_CY);jctx.stroke();
  jctx.beginPath();jctx.moveTo(JOY_CX,JOY_CY-JOY_R+8);jctx.lineTo(JOY_CX,JOY_CY+JOY_R-8);jctx.stroke();
  // 方向提示
  jctx.fillStyle='rgba(255,255,255,0.2)';jctx.font='12px monospace';jctx.textAlign='center';
  jctx.fillText('◀',JOY_CX-JOY_R+16,JOY_CY+4);
  jctx.fillText('▶',JOY_CX+JOY_R-16,JOY_CY+4);
  jctx.fillText('▲',JOY_CX,JOY_CY-JOY_R+14);
  jctx.fillText('▼',JOY_CX,JOY_CY+JOY_R-6);
  // 摇杆
  const tx=joy.rawX*JOY_R*0.75,ty=joy.rawY*JOY_R*0.75;
  jctx.beginPath();jctx.arc(JOY_CX+tx,JOY_CY+ty,THUMB_R,0,Math.PI*2);
  jctx.fillStyle=joy.active?'rgba(233,69,96,0.5)':'rgba(255,255,255,0.12)';
  jctx.fill();
  jctx.strokeStyle=joy.active?'#e94560':'rgba(255,255,255,0.25)';
  jctx.lineWidth=2;jctx.stroke();
  jctx.restore();
}

// ===== 触摸控制（原生 touch 事件，支持多点触控）======
const touchMap=new Map(); // touchId -> 'joy'|'jump'

function joyCalc(clientX,clientY){
  const r=joyCanvas.getBoundingClientRect();
  const sx=joyCanvas.width/r.width,sy=joyCanvas.height/r.height;
  let px=(clientX-r.left)*sx-JOY_CX,py=(clientY-r.top)*sy-JOY_CY;
  const d=Math.sqrt(px*px+py*py);
  if(d>JOY_R){px=px/d*JOY_R;py=py/d*JOY_R;}
  joy.rawX=px/JOY_R;joy.rawY=py/JOY_R;joy.active=true;
  // 摇盘只控制左右，Y轴死区加大防误触跳跃
  const THX=0.2,THY=0.6;
  joy.dx=Math.abs(joy.rawX)<THX?0:(joy.rawX>0?1:-1);
  joy.dy=0; // 禁用摇盘Y轴，跳跃只由右侧按钮触发
}
function joyReset(){joy.dx=0;joy.dy=0;joy.rawX=0;joy.rawY=0;joy.active=false;}

const jbtn=document.getElementById('jbtn');
const dbtn=document.getElementById('dbtn');
function jumpTrigger(){if(state==='run')D.jump();else startGame();}

// 全局 touchstart
document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    const rj=joyCanvas.getBoundingClientRect();
    const rb=jbtn.getBoundingClientRect();
    const rd=dbtn.getBoundingClientRect();
    // 判断触摸点在哪个控件上
    if(t.clientX>=rj.left&&t.clientX<=rj.right&&t.clientY>=rj.top&&t.clientY<=rj.bottom){
      touchMap.set(t.identifier,'joy');
      joyCalc(t.clientX,t.clientY);
    }else if(t.clientX>=rb.left&&t.clientX<=rb.right&&t.clientY>=rb.top&&t.clientY<=rb.bottom){
      touchMap.set(t.identifier,'jump');
      jbtn.style.background='rgba(233,69,96,0.7)';
      jbtn.style.borderColor='#e94560';
      jumpTrigger();
    }else if(t.clientX>=rd.left&&t.clientX<=rd.right&&t.clientY>=rd.top&&t.clientY<=rd.bottom){
      touchMap.set(t.identifier,'duck');
      dbtn.style.background='rgba(255,255,255,0.3)';
      if(state==='run')D.setDuck(true);
    }
  }
},{passive:true});

// 全局 touchmove
document.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(touchMap.get(t.identifier)==='joy'){
      joyCalc(t.clientX,t.clientY);
    }
  }
},{passive:true});

// 全局 touchend / touchcancel
function touchEnd(e){
  for(const t of e.changedTouches){
    const role=touchMap.get(t.identifier);
    touchMap.delete(t.identifier);
    if(role==='joy'){
      // 只有当没有其他 joy 触摸点时才重置
      let hasJoy=false;
      for(const v of touchMap.values())if(v==='joy')hasJoy=true;
      if(!hasJoy)joyReset();
    }else if(role==='jump'){
      jbtn.style.background='rgba(233,69,96,0.2)';
      jbtn.style.borderColor='rgba(233,69,96,0.5)';
    }else if(role==='duck'){
      dbtn.style.background='rgba(255,255,255,0.08)';
      D.setDuck(false);
    }
  }
  // 所有手指离开
  if(e.touches.length===0)joyReset();
}
document.addEventListener('touchend',touchEnd);
document.addEventListener('touchcancel',touchEnd);

// 防止页面滚动/缩放
document.addEventListener('touchmove',e=>{
  if(e.target===cv||e.target===joyCanvas||e.target===jbtn)e.preventDefault();
},{passive:false});

// ===== 嘲讽 =====
const taunts={
  die:['💀 你死了！','🤡 又没了？','😤 太菜了！','😂 笑死我了','🧠 反应速度负数','👻 下次加油','🎮 手残党认证'],
  hit:['😱 好险！','😅 差一点','⚡ 电光火石','🙈 没看见！'],
  idle:['😴 睡着了？','🦥 比乌龟还慢','🐢 动一下啊'],
  doubleJump:['🦘 二段跳！','✨ 漂亮！','🔥 操作不错'],
  duck:['🦆 蹲下躲避','🥷 忍者蹲'],
  fast:['🚀 速度不错！','💨 风一样的速度'],
  combo:['🔥 连续闪避！','💫 完美操作！','⭐ 技术不错！']
};
let cTaunt='',tT=0,tC='#fff',hitC=0,lastTT=0,idleT=0;
function showTaunt(t,c){const n=Date.now();if(n-lastTT<800)return;cTaunt=c||taunts[t][Math.floor(Math.random()*taunts[t].length)];tT=80;tC=t==='die'?'#e94560':t==='hit'?'#ff6b35':t==='combo'?'#ffd700':'#fff';lastTT=n;}
function drawTaunt(){if(tT<=0)return;tT--;cx.globalAlpha=Math.min(1,tT/20);cx.fillStyle=tC;cx.font='bold 16px monospace';cx.textAlign='center';const s=tT>60?Math.random()*4-2:0;cx.fillText(cTaunt,JW/2+s,60+s);cx.globalAlpha=1;}

// ===== 恐龙 =====
const D={
  x:JW/2-16,y:GY-40,w:32,h:40,vy:0,vx:0,gnd:true,dbl:true,duck:false,fr:0,tm:0,faceR:true,prevDuck:false,
  reset(){this.x=JW/2-16;this.y=GY-this.h;this.vy=0;this.vx=0;this.gnd=true;this.dbl=true;this.duck=false;this.h=40;this.faceR=true;this.prevDuck=false;},
  jump(){if(this.gnd){this.vy=-14;this.gnd=false;this.dbl=true;}else if(this.dbl){this.vy=-12;this.dbl=false;spark(this.x+16,this.y+this.h,6);showTaunt('doubleJump');}},
  setDuck(v){if(v===this.prevDuck)return;this.prevDuck=v;if(v&&this.gnd){this.duck=true;this.h=24;this.y=GY-24;}else if(!v){this.duck=false;this.h=40;this.y=GY-40;}},
  moveL(){this.vx=-MSPEED;this.faceR=false;},moveR(){this.vx=MSPEED;this.faceR=true;},stopM(){this.vx=0;},
  upd(){this.x+=this.vx;if(this.x<0)this.x=0;if(this.x>JW-this.w)this.x=JW-this.w;if(!this.gnd){this.vy+=0.6;this.y+=this.vy;if(this.y>=GY-this.h){this.y=GY-this.h;this.vy=0;this.gnd=true;this.dbl=false;}}this.tm++;if(this.tm>5){this.tm=0;this.fr^=1;}},
  box(){return this.duck?{x:this.x+2,y:this.y+2,w:28,h:20}:{x:this.x+4,y:this.y+4,w:24,h:34};},
  draw(){
    const x=this.x,y=this.y,f=this.faceR;cx.fillStyle='#e94560';
    if(this.duck){
      cx.fillRect(x,y+4,36,12);if(f){cx.fillRect(x+32,y,10,9);cx.fillStyle='#fff';cx.fillRect(x+37,y+2,3,3);}else{cx.fillRect(x-2,y,10,9);cx.fillStyle='#fff';cx.fillRect(x+1,y+2,3,3);}
      cx.fillStyle='#e94560';cx.fillRect(x+(f?(this.fr?6:14):(this.fr?16:8)),y+16,7,8);cx.fillRect(x+(f?(this.fr?18:24):(this.fr?8:18)),y+16,7,8);
    }else{
      cx.fillRect(x+4,y+10,22,20);
      if(f){cx.fillRect(x+14,y,22,15);cx.fillStyle='#fff';cx.fillRect(x+30,y+3,5,5);cx.fillStyle='#e94560';cx.fillRect(x+32,y+4,2,2);cx.fillRect(x+36,y+12,4,2);cx.fillRect(x,y+10,6,4);cx.fillRect(x-2,y+7,4,5);cx.fillRect(x+24,y+18,7,3);}
      else{cx.fillRect(x-4,y,22,15);cx.fillStyle='#fff';cx.fillRect(x+2,y+3,5,5);cx.fillStyle='#e94560';cx.fillRect(x+4,y+4,2,2);cx.fillRect(x-2,y+12,4,2);cx.fillRect(x+22,y+10,6,4);cx.fillRect(x+26,y+7,4,5);cx.fillRect(x+5,y+18,7,3);}
      if(this.gnd){if(this.fr){cx.fillRect(x+6,y+30,6,10);cx.fillRect(x+18,y+30,6,10);}else{cx.fillRect(x+10,y+30,6,10);cx.fillRect(x+14,y+30,6,10);}}else{cx.fillRect(x+6,y+30,6,8);cx.fillRect(x+18,y+32,6,6);}
    }
  }
};

// ===== 障碍物 =====
let obs=[],sparkP=[],warnX=null,warnT=0;
function spawnObs(){
  const r=Math.random();
  if(r<0.5){const x=D.faceR?JW+20:-40;const ts=['spike','tallSpike','doubleSpike'];const t=ts[Math.floor(Math.random()*3)];let w,h;switch(t){case'spike':w=14;h=28;break;case'tallSpike':w=16;h=40;break;default:w=30;h=30;}obs.push({x,dir:1,w,h,t});}
  else if(r<0.75&&score>30){const x=D.faceR?-40:JW+20;const ts=['fireball','saw'];const t=ts[Math.floor(Math.random()*2)];obs.push({x,dir:-1,w:t==='fireball'?16:22,h:t==='fireball'?16:22,y:GY-Math.random()*50-30,t,rot:0});}
  else{const dx=Math.max(30,Math.min(JW-50,D.x+(Math.random()-0.5)*250));const t=Math.random()<0.5?'drop':'bomb';warnX=dx;warnT=40;setTimeout(()=>{if(state==='run')obs.push({x:dx,dir:0,w:18,h:18,t,vy:3+Math.random()*2,y:-30});},400);}
}
function updObs(){for(let i=obs.length-1;i>=0;i--){const o=obs[i];if(o.dir===1)o.x-=speed;else if(o.dir===-1)o.x+=speed*0.9;else{o.y+=o.vy;if(o.t==='bomb'&&!o.exploded&&o.y>GY-40){o.exploded=true;spark(o.x+10,o.y+12,20);if(Math.abs(D.x+16-o.x-10)<60&&Math.abs(D.y+20-o.y-12)<50){if(shieldActive){shieldActive=false;shieldTimer=0;spark(D.x+16,D.y+20,10);showTaunt('hit','🛡️ 护盾抵挡！');}else{endGame();return;}}}if(o.t==='saw')o.rot=(o.rot||0)+0.3;if(o.x<-80||o.x>JW+80||o.y>JH+40){obs.splice(i,1);continue;}if(o.t==='bomb'&&o.exploded)continue;if(hitBox(o)){endGame();return;}}if(warnT<=0)warnX=null;}}
function hitBox(o){
  const b=D.box();let ox=o.x,oy=o.dir===1?GY-o.h:o.y;
  const r=b.x<ox+o.w-6&&b.x+b.w>ox+6&&b.y<oy+o.h-6&&b.y+b.h>oy+6;
  if(r){
    if(shieldActive){shieldActive=false;shieldTimer=0;spark(D.x+16,D.y+20,10);showTaunt('hit','🛡️ 护盾抵挡！');return false;}
    hitC++;if(hitC>=3)showTaunt('combo');
  }
  return r;
}
function drawObs(){obs.forEach(o=>{let x=o.x,y=o.dir===1?GY-o.h:o.y;cx.fillStyle=o.dir===1?'#555':o.dir===-1?'#ff6b35':'#ffd700';switch(o.t){case'spike':cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+7,y);cx.lineTo(x+14,GY);cx.fill();break;case'tallSpike':cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+8,y);cx.lineTo(x+16,GY);cx.fill();cx.fillRect(x+3,y+8,10,4);break;case'doubleSpike':cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+7,y+4);cx.lineTo(x+14,GY);cx.fill();cx.beginPath();cx.moveTo(x+16,GY);cx.lineTo(x+23,y);cx.lineTo(x+30,GY);cx.fill();break;case'fireball':cx.fillRect(x,y,16,16);cx.fillStyle='#ffaa00';cx.fillRect(x+3,y+3,10,10);break;case'saw':cx.save();cx.translate(x+11,y+11);cx.rotate(o.rot||0);cx.fillStyle='#aaa';for(let j=0;j<6;j++){cx.fillRect(-2,-10,4,4);cx.rotate(Math.PI/3);}cx.fillStyle='#555';cx.beginPath();cx.arc(0,0,4,0,Math.PI*2);cx.fill();cx.restore();break;case'drop':cx.fillStyle='#ffd700';cx.beginPath();cx.moveTo(x+9,y);cx.lineTo(x+18,y+18);cx.lineTo(x,y+18);cx.closePath();cx.fill();break;case'bomb':cx.fillStyle='#333';cx.beginPath();cx.arc(x+10,y+14,10,0,Math.PI*2);cx.fill();cx.fillStyle='#e94560';cx.fillRect(x+8,y,4,6);cx.fillStyle='#ff6b35';cx.fillRect(x+6,y-2,8,3);break;}});if(warnT>0&&warnX!==null){cx.fillStyle=`rgba(255,215,0,${(Math.sin(Date.now()/80)*0.3+0.4)*(warnT/50)})`;cx.fillRect(warnX-5,0,30,GY);cx.fillStyle='#ffd700';cx.beginPath();cx.moveTo(warnX+10,10);cx.lineTo(warnX+5,25);cx.lineTo(warnX+15,25);cx.closePath();cx.fill();cx.font='12px monospace';cx.textAlign='center';cx.fillText('⚠',warnX+10,40);warnT--;}}
function spark(x,y,n){for(let i=0;i<n;i++)sparkP.push({x,y,vx:(Math.random()-0.5)*6,vy:-Math.random()*4-1,life:18+Math.random()*12,c:Math.random()>0.5?'#e94560':'#ff6b35'});}
function updSpark(){for(let i=sparkP.length-1;i>=0;i--){const p=sparkP[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;if(--p.life<=0)sparkP.splice(i,1);}}
function drawSpark(){sparkP.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.c;cx.fillRect(p.x,p.y,3,3);});cx.globalAlpha=1;}
// ===== 背景怪物 =====
let monsters=[];
let monsterSpawnT=0;
function spawnMonster(){
  const side=Math.random()<0.5?0:1; // 0=左飞入, 1=右飞入
  monsters.push({
    x:side?JW+30:-30,
    y:15+Math.random()*50,
    dir:side?-1:1,
    speed:1.5+Math.random()*1,
    wing:0, // 翅膀动画帧
    wingT:0,
    threw:false, // 是否已扔过障碍物
    type:Math.floor(Math.random()*3), // 0=蝙蝠 1=鸟 2=龙
    size:20+Math.random()*10
  });
}
function updMonsters(dt){
  monsterSpawnT+=dt;
  if(monsterSpawnT>180&&score>20){ // 每3秒可能刷一只，需要一定分数
    monsterSpawnT=0;
    if(Math.random()<0.4)spawnMonster();
  }
  for(let i=monsters.length-1;i>=0;i--){
    const m=monsters[i];
    m.x+=m.speed*m.dir*dt;
    m.wingT+=dt;if(m.wingT>6){m.wingT=0;m.wing^=1;}
    // 飞到恐龙头顶附近时扔障碍物
    if(!m.threw&&Math.abs(m.x-D.x)<100&&m.x>50&&m.x<JW-50){
      m.threw=true;
      const t=Math.random()<0.5?'drop':'bomb';
      obs.push({x:m.x,dir:0,w:18,h:18,t,vy:2.5+Math.random()*1.5,y:m.y+m.size});
      if(t==='bomb'){
        // 怪物扔炸弹有警告
        warnX=m.x;warnT=30;
      }
    }
    // 飞出屏幕
    if(m.x<-60||m.x>JW+60)monsters.splice(i,1);
  }
}
function drawMonsters(){
  monsters.forEach(m=>{
    const x=m.x,y=m.y,s=m.size,f=m.wing;
    cx.save();
    // 怪物身体
    switch(m.type){
      case 0: { // 蝙蝠
        cx.fillStyle='#6b2fa0';
        cx.beginPath();cx.arc(x,y+s*0.4,s*0.35,0,Math.PI*2);cx.fill();
        // 翅膀
        cx.fillStyle='#8b3fc0';
        const wingY=f?-s*0.3:0;
        cx.beginPath();cx.moveTo(x-s*0.2,y+s*0.2);cx.lineTo(x-s*0.8,y+wingY);cx.lineTo(x-s*0.1,y+s*0.1);cx.fill();
        cx.beginPath();cx.moveTo(x+s*0.2,y+s*0.2);cx.lineTo(x+s*0.8,y+wingY);cx.lineTo(x+s*0.1,y+s*0.1);cx.fill();
        // 眼睛
        cx.fillStyle='#ff4444';cx.fillRect(x-s*0.12,y+s*0.25,3,3);cx.fillRect(x+s*0.06,y+s*0.25,3,3);
        break;
      }
      case 1: { // 怪鸟
        cx.fillStyle='#2d5a1e';
        cx.beginPath();cx.ellipse(x,y+s*0.3,s*0.4,s*0.25,0,0,Math.PI*2);cx.fill();
        // 翅膀
        cx.fillStyle='#3d7a2e';
        const wy=f?-s*0.4:-s*0.1;
        cx.beginPath();cx.moveTo(x-s*0.1,y+s*0.15);cx.lineTo(x-s*0.6,y+wy);cx.lineTo(x+s*0.1,y+s*0.2);cx.fill();
        cx.beginPath();cx.moveTo(x+s*0.1,y+s*0.15);cx.lineTo(x+s*0.6,y+wy);cx.lineTo(x-s*0.1,y+s*0.2);cx.fill();
        // 嘴
        cx.fillStyle='#ffaa00';
        cx.beginPath();cx.moveTo(x+s*0.35,y+s*0.3);cx.lineTo(x+s*0.6,y+s*0.35);cx.lineTo(x+s*0.35,y+s*0.4);cx.fill();
        break;
      }
      case 2: { // 小龙
        cx.fillStyle='#8b0000';
        cx.beginPath();cx.ellipse(x,y+s*0.35,s*0.45,s*0.3,0,0,Math.PI*2);cx.fill();
        // 翅膀
        cx.fillStyle='#aa2222';
        const dy=f?-s*0.5:-s*0.15;
        cx.beginPath();cx.moveTo(x-s*0.15,y+s*0.1);cx.lineTo(x-s*0.7,y+dy);cx.lineTo(x,y+s*0.15);cx.fill();
        cx.beginPath();cx.moveTo(x+s*0.15,y+s*0.1);cx.lineTo(x+s*0.7,y+dy);cx.lineTo(x,y+s*0.15);cx.fill();
        // 眼睛+火焰
        cx.fillStyle='#ff6600';cx.fillRect(x-s*0.15,y+s*0.2,4,4);cx.fillRect(x+s*0.08,y+s*0.2,4,4);
        if(f){cx.fillStyle='#ff4400';cx.fillRect(x+(m.dir<0?-s*0.5:s*0.3),y+s*0.3,8,3);}
        break;
      }
    }
    cx.restore();
  });
}

// ===== 道具系统 =====
let powerups=[];
let powerupSpawnT=0;
let shieldActive=false,shieldTimer=0;
let slowActive=false,slowTimer=0;

function spawnPowerup(){
  const types=['shield','slow','heart'];
  const t=types[Math.floor(Math.random()*types.length)];
  powerups.push({
    x:JW+20,
    y:30+Math.random()*(GY-60),
    t:t,
    w:18,h:18,
    bob:Math.random()*Math.PI*2 // 上下浮动
  });
}
function updPowerups(dt){
  powerupSpawnT+=dt;
  if(powerupSpawnT>400&&score>50){ // 每 ~6.5 秒可能刷一个
    powerupSpawnT=0;
    if(Math.random()<0.35)spawnPowerup();
  }
  // 盾牌和减速计时（用真实时间）
  if(shieldActive&&Date.now()>shieldTimer){shieldActive=false;}
  if(slowActive&&Date.now()>slowTimer){slowActive=false;speed=Math.max(4,speed);}

  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.x-=speed*dt*0.5; // 比障碍物慢一点
    p.bob+=dt*0.08;
    // 碰撞检测
    const b=D.box();
    const py=p.y+Math.sin(p.bob)*5;
    if(b.x<p.x+p.w&&b.x+b.w>p.x&&b.y<py+p.h&&b.y+b.h>py){
      // 拾取
      if(p.t==='shield'){shieldActive=true;shieldTimer=Date.now()+5000;showTaunt('hit','🛡️ 护盾5秒！');}
      else if(p.t==='slow'){slowActive=true;slowTimer=Date.now()+4000;speed=Math.max(4,speed*0.5);showTaunt('hit','🐌 减速4秒！');}
      else if(p.t==='heart'){score+=20;showTaunt('hit','❤️ 加分！');}
      powerups.splice(i,1);continue;
    }
    if(p.x<-30)powerups.splice(i,1);
  }
}
function drawPowerups(){
  powerups.forEach(p=>{
    const x=p.x,y=p.y+Math.sin(p.bob)*5;
    // 发光底圈
    cx.fillStyle=p.t==='shield'?'rgba(0,150,255,0.15)':p.t==='slow'?'rgba(0,255,150,0.15)':'rgba(255,100,100,0.15)';
    cx.beginPath();cx.arc(x+9,y+9,14,0,Math.PI*2);cx.fill();
    // 图标
    cx.font='16px monospace';cx.textAlign='center';
    if(p.t==='shield'){cx.fillStyle='#00aaff';cx.fillText('🛡️',x+9,y+14);}
    else if(p.t==='slow'){cx.fillStyle='#00ff96';cx.fillText('⏳',x+9,y+14);}
    else{cx.fillStyle='#ff6464';cx.fillText('❤️',x+9,y+14);}
  });
  // 显示当前激活的道具状态
  let sy=JH-10;
  if(shieldActive){
    const remain=Math.max(0,Math.ceil((shieldTimer-Date.now())/1000));
    cx.fillStyle='rgba(0,150,255,0.6)';cx.font='10px monospace';cx.textAlign='left';
    cx.fillText('🛡️ '+remain+'s',10,sy);sy-=14;
  }
  if(slowActive){
    const remain=Math.max(0,Math.ceil((slowTimer-Date.now())/1000));
    cx.fillStyle='rgba(0,255,150,0.6)';cx.font='10px monospace';cx.textAlign='left';
    cx.fillText('⏳ '+remain+'s',10,sy);
  }
}

let gd=0;

// ===== 背景视差动画 =====
// 星星
const stars=[];for(let i=0;i<40;i++)stars.push({x:Math.random()*JW,y:Math.random()*GY*0.6,s:Math.random()*1.5+0.5,b:Math.random()});
// 远山
const mts=[];{let mx=0;while(mx<JW+100){const mw=60+Math.random()*80;const mh=30+Math.random()*50;mts.push({x:mx,w:mw,h:mh});mx+=mw-10+Math.random()*20;}}
// 云
const clouds=[];for(let i=0;i<5;i++)clouds.push({x:Math.random()*JW*1.5,y:10+Math.random()*60,w:40+Math.random()*50,h:12+Math.random()*10,s:0.15+Math.random()*0.2});

let bgScroll1=0,bgScroll2=0,bgScroll3=0;
function drawBG(dt){
  // 星星（不滚动，闪烁）
  cx.fillStyle='#fff';
  stars.forEach(s=>{
    const flicker=0.4+Math.sin(Date.now()*0.003+s.b*10)*0.3+s.b*0.3;
    cx.globalAlpha=flicker;
    cx.fillRect(s.x,s.y,s.s,s.s);
  });
  cx.globalAlpha=1;

  // 远山（最慢，速度的 0.15 倍）
  bgScroll1+=speed*dt*0.15;
  cx.fillStyle='#1a1a3a';
  mts.forEach(m=>{
    const mx=((m.x-bgScroll1)%(JW+200)+JW+200)%(JW+200)-100;
    cx.beginPath();cx.moveTo(mx,GY);cx.lineTo(mx+m.w*0.3,GY-m.h);cx.lineTo(mx+m.w*0.6,GY-m.h*0.7);cx.lineTo(mx+m.w,GY);cx.closePath();cx.fill();
  });

  // 远山轮廓线
  cx.strokeStyle='#252550';cx.lineWidth=1;
  cx.beginPath();
  let started=false;
  mts.forEach(m=>{
    const mx=((m.x-bgScroll1)%(JW+200)+JW+200)%(JW+200)-100;
    if(!started){cx.moveTo(mx,GY);started=true;}
    cx.lineTo(mx+m.w*0.3,GY-m.h);cx.lineTo(mx+m.w*0.6,GY-m.h*0.7);cx.lineTo(mx+m.w,GY);
  });
  cx.stroke();

  // 近山（中速，速度的 0.3 倍）
  bgScroll2+=speed*dt*0.3;
  cx.fillStyle='#12122a';
  for(let i=0;i<6;i++){
    const bx=((i*180-bgScroll2)%(JW+360)+JW+360)%(JW+360)-180;
    const bh=20+((i*37)%40);
    cx.beginPath();cx.moveTo(bx,GY);cx.lineTo(bx+40,GY-bh);cx.lineTo(bx+80,GY-bh*0.6);cx.lineTo(bx+120,GY);cx.closePath();cx.fill();
  }

  // 云（慢速飘动）
  bgScroll3+=dt*clouds[0].s*0.5;
  cx.fillStyle='rgba(255,255,255,0.04)';
  clouds.forEach(c=>{
    const cx2=((c.x-bgScroll3*c.s)%(JW+c.w+100)+JW+c.w+100)%(JW+c.w+100)-c.w-50;
    cx.beginPath();cx.ellipse(cx2,c.y,c.w/2,c.h/2,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(cx2-c.w*0.3,c.y+3,c.w*0.35,c.h*0.4,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(cx2+c.w*0.3,c.y+2,c.w*0.3,c.h*0.35,0,0,Math.PI*2);cx.fill();
  });
}

function drawGround(){cx.strokeStyle='#444';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GY);cx.lineTo(JW,GY);cx.stroke();gd-=speed;if(gd<-20)gd+=20;cx.fillStyle='#555';for(let x=gd;x<JW;x+=20)cx.fillRect(x,GY+4,12,2);}
function drawHUD(){cx.fillStyle='rgba(0,0,0,0.3)';cx.fillRect(10,8,120,18);cx.strokeStyle='#444';cx.strokeRect(10,8,120,18);cx.fillStyle='#e94560';cx.fillRect(12,10,D.x/JW*116,14);cx.fillStyle='#888';cx.font='8px monospace';cx.textAlign='left';cx.fillText('位置',14,20);cx.fillStyle='rgba(0,0,0,0.3)';cx.fillRect(JW-110,8,100,18);cx.fillStyle='#ff6b35';cx.font='10px monospace';cx.textAlign='right';cx.fillText('速度: '+speed.toFixed(1),JW-16,20);}
function pad(n){return String(Math.floor(n)).padStart(5,'0');}

// ===== 游戏 =====
let state='idle',score=0,speed=MOBILE?4:5,hi=parseInt(localStorage.getItem('dh')||'0');
let spawnT=0,spawnI=70,keys={},dist=0,lastTS=0;
document.getElementById('hi').textContent=pad(hi);
function init(){D.reset();obs=[];sparkP=[];score=0;speed=MOBILE?4:5;spawnT=0;spawnI=40;keys={};warnX=null;warnT=0;dist=0;idleT=0;hitC=0;lastTS=0;monsters=[];monsterSpawnT=0;powerups=[];powerupSpawnT=0;shieldActive=false;shieldTimer=0;slowActive=false;slowTimer=0;document.getElementById('sc').textContent='00000';}
function startGame(){init();state='run';showTaunt('hit',Math.random()<0.5?'🎮 开始了！':'🏃 冲啊！');}
function endGame(){state='over';D.vx=0;hitC=0;showTaunt('die');if(score>hi){hi=Math.floor(score);localStorage.setItem('dh',hi);document.getElementById('hi').textContent=pad(hi);}}

function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTS)lastTS=ts;
  const dt=Math.min(((ts-lastTS)/16.67)||1,3);lastTS=ts;

  // 输入
  if(state==='run'){
    if(joy.dx<0||keys.ArrowLeft||keys.KeyA)D.moveL();
    else if(joy.dx>0||keys.ArrowRight||keys.KeyD)D.moveR();
    else D.stopM();
  }

  cx.clearRect(0,0,JW,JH);
  cx.fillStyle='#0f0c29';cx.fillRect(0,0,JW,JH);
  drawBG(dt);
  drawGround();
  if(state==='run'){
    score+=0.2*dt;document.getElementById('sc').textContent=pad(score);
    dist+=speed*dt;
    if(!slowActive){
      if(MOBILE){if(speed<10)speed=4+dist*0.00006;}
      else{if(speed<14)speed=5+dist*0.0001;}
    }
    if(speed>10&&Math.random()<0.002*dt)showTaunt('fast');
    spawnI=Math.max(20,50-Math.floor(speed*3));spawnT+=dt;
    if(spawnT>=spawnI){spawnT=0;spawnObs();if(speed>10&&Math.random()<0.3)spawnObs();}
    updObs();D.upd();updSpark();updMonsters(dt);updPowerups(dt);
  }
  drawMonsters();drawObs();D.draw();drawSpark();drawPowerups();drawHUD();drawTaunt();
  if(state==='idle'){idleT++;if(idleT>150&&idleT%150===0)showTaunt('idle');cx.fillStyle='#e94560';cx.font='16px monospace';cx.textAlign='center';if(Math.floor(Date.now()/350)%2)cx.fillText(MOBILE?'👇 点 JUMP 开始':'按 空格 开始',JW/2,90);cx.font='11px monospace';cx.fillStyle='#666';cx.fillText(MOBILE?'摇盘移动 | JUMP跳跃':'← → 移动 | 空格跳跃 | ↓蹲',JW/2,115);}else idleT=0;
  if(state==='over'){cx.fillStyle='#e94560';cx.font='bold 22px monospace';cx.textAlign='center';cx.fillText('GAME OVER',JW/2,80);cx.font='14px monospace';if(Math.floor(Date.now()/350)%2)cx.fillText(MOBILE?'👇 点 JUMP 重开':'按 空格 重开',JW/2,105);cx.fillStyle='#ff6b35';cx.fillText('得分: '+pad(score),JW/2,125);cx.fillStyle='#888';cx.fillText('距离: '+Math.floor(dist)+'m',JW/2,145);}
  if(MOBILE)drawJoy();
}

// 键盘
let _sp=false;
onkeydown=e=>{keys[e.code]=true;if((e.code==='Space'||e.code==='ArrowUp')&&!_sp){e.preventDefault();_sp=true;if(state==='run')D.jump();else startGame();}if(e.code==='ArrowDown'){e.preventDefault();if(state==='run')D.setDuck(true);}};
onkeyup=e=>{keys[e.code]=false;if(e.code==='Space'||e.code==='ArrowUp')_sp=false;if(e.code==='ArrowDown')D.setDuck(false);};
cv.addEventListener('click',()=>{if(state!=='run')startGame();});
requestAnimationFrame(loop);
</script>
